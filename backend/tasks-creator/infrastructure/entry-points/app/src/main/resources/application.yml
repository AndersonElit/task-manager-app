spring:
  config:
    import: "optional:env[.env]"
  r2dbc:
    url: ${R2DBC_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

server:
  port: ${SERVER_PORT}

aws:
  endpoint-url: ${AWS_ENDPOINT_URL}
  region: ${AWS_REGION}
  access-key: ${AWS_ACCESS_KEY_ID}
  secret-key: ${AWS_SECRET_ACCESS_KEY}

sqs:
  queue-url: ${SQS_QUEUE_URL}
